<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilon AI Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f5f6f8;
            --card: #ffffff;
            --muted: #64748b;
            --text: #1a1a2e;
            --border: #e2e8f0;
            --accent: #2563eb;
            --accent-2: #3b82f6;
            --danger: #ef4444;
        }
        body {
            min-height: 100vh;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
                linear-gradient(180deg, #f8fafc, var(--bg));
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            width: min(100%, 420px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .brand img {
            width: 108px;
            height: auto;
            display: block;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .field {
            margin-bottom: 14px;
        }
        .field label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .field input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font: inherit;
            color: var(--text);
            background: #f8fafc;
            outline: none;
        }
        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        .login-btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }
        .login-btn:hover {
            filter: brightness(1.03);
        }
        .error {
            display: none;
            margin-top: 12px;
            color: var(--danger);
            font-size: 13px;
            text-align: center;
        }
        .hint {
            margin-top: 18px;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="brand">
            <img src="/static/swf-logo.svg?v=1" alt="Tilon AI logo">
            <strong>Tilon AI</strong>
        </div>
        <h1>로그인</h1>
        <p>로그인 후 사용자별 주소로 이동합니다. 예: `/admin`</p>

        <div class="field">
            <label for="login-id">User ID</label>
            <input id="login-id" type="text" autocomplete="username" placeholder="아이디를 입력하세요">
        </div>
        <div class="field">
            <label for="login-pw">Password</label>
            <input id="login-pw" type="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요">
        </div>
        <button class="login-btn" id="login-btn" type="button">로그인</button>
        <div class="error" id="login-error">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        <div class="hint">로그인 후에는 사용자 주소별로 화면이 분리됩니다.</div>
    </main>

    <script>
        const SESSION_USER_KEY = 'ai_current_user';
        const USERS = JSON.parse(localStorage.getItem('ai_users') || 'null') || {
            'admin': { pw: 'admin123', role: '관리자' },
            'tilon': { pw: 'tilon123', role: '일반사용자' },
            'employee1': { pw: '1234', role: '일반사용자' }
        };

        const loginIdEl = document.getElementById('login-id');
        const loginPwEl = document.getElementById('login-pw');
        const loginBtnEl = document.getElementById('login-btn');
        const loginErrorEl = document.getElementById('login-error');

        function hideError() {
            loginErrorEl.style.display = 'none';
        }

        function showError() {
            loginErrorEl.style.display = 'block';
            loginPwEl.value = '';
            loginPwEl.focus();
        }

        function targetPathForUser(userId) {
            return '/' + encodeURIComponent(userId);
        }

        function doLogin() {
            const id = loginIdEl.value.trim();
            const pw = loginPwEl.value;
            const user = USERS[id];

            if (!(user && user.pw === pw)) {
                showError();
                return;
            }

            sessionStorage.setItem(SESSION_USER_KEY, id);
            window.location.href = targetPathForUser(id);
        }

        loginBtnEl.addEventListener('click', doLogin);
        loginIdEl.addEventListener('input', hideError);
        loginPwEl.addEventListener('input', hideError);
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') doLogin();
        });
        loginIdEl.focus();
    </script>
</body>
</html>
