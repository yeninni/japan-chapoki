<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilon AI ログイン</title>
    <link rel="icon" type="image/svg+xml" href="/static/tilon-logo.svg?v=3">
    <link rel="shortcut icon" href="/static/tilon-logo.svg?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        img {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            background-color: transparent !important;
        }
        :root {
            --bg: #f5f6f8;
            --bg2: #ffffff;
            --bg3: #f0f1f3;
            --accent: #2563eb;
            --accent2: #3b82f6;
            --tp: #1a1a2e;
            --ts: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
        }
        body {
            min-height: 100vh;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--tp);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            width: min(100%, 400px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10);
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            background-color: transparent;
            gap: 0;
        }
        .logo-wrapper img {
            display: block;
            mix-blend-mode: multiply;
        }
        .login-logo {
            gap: 12px;
            margin-bottom: 32px;
        }
        .login-logo span {
            font-size: 20px;
            font-weight: 700;
            color: var(--tp);
        }
        .brand-mark {
            display: block;
            width: 52px;
            height: auto;
            flex-shrink: 0;
        }
        .login-card h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .login-card p {
            font-size: 14px;
            color: var(--ts);
            margin-bottom: 28px;
        }
        .fg {
            margin-bottom: 16px;
        }
        .fg label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--ts);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .fg input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--tp);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .fg input:focus {
            border-color: var(--accent);
        }
        .login-btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
        }
        .login-btn:hover {
            background: var(--accent2);
        }
        .login-err {
            color: var(--danger);
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="login-logo logo-wrapper">
            <img class="brand-mark" src="/static/tilon-logo.svg?v=2" alt="Tilon AI ロゴ">
            <span>Tilon AI</span>
        </div>
        <h1>ログイン</h1>
        <p>職員アカウントでログインしてください</p>
        <div class="fg">
            <label for="login-id">ユーザーID</label>
            <input id="login-id" type="text" autocomplete="username" placeholder="ユーザーIDを入力">
        </div>
        <div class="fg">
            <label for="login-pw">パスワード</label>
            <input id="login-pw" type="password" autocomplete="current-password" placeholder="パスワードを入力">
        </div>
        <button class="login-btn" id="login-btn" type="button">ログイン</button>
        <div class="login-err" id="login-error">ユーザーIDまたはパスワードが正しくありません。</div>
    </main>

    <script>
        const SESSION_USER_KEY = 'ai_current_user';
        const USERS = JSON.parse(localStorage.getItem('ai_users') || 'null') || {
            'admin': { pw: 'admin123', role: '管理者' },
            'tilon': { pw: 'tilon123', role: '一般従業員' },
            'employee1': { pw: '1234', role: '一般従業員' }
        };

        const loginIdEl = document.getElementById('login-id');
        const loginPwEl = document.getElementById('login-pw');
        const loginBtnEl = document.getElementById('login-btn');
        const loginErrorEl = document.getElementById('login-error');

        function hideError() {
            loginErrorEl.style.display = 'none';
        }

        function showError() {
            loginErrorEl.style.display = 'block';
            loginPwEl.value = '';
            loginPwEl.focus();
        }

        function targetPathForUser(userId) {
            return '/' + encodeURIComponent(userId);
        }

        function doLogin() {
            const id = loginIdEl.value.trim();
            const pw = loginPwEl.value;
            const user = USERS[id];

            if (!(user && user.pw === pw)) {
                showError();
                return;
            }

            sessionStorage.setItem(SESSION_USER_KEY, id);
            window.location.href = targetPathForUser(id);
        }

        loginBtnEl.addEventListener('click', doLogin);
        loginIdEl.addEventListener('input', hideError);
        loginPwEl.addEventListener('input', hideError);
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') doLogin();
        });
        loginIdEl.focus();
    </script>
</body>
</html>
