<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilon AI チャットボット</title>
    <link rel="icon" type="image/svg+xml" href="/static/tilon-logo.svg?v=3">
    <link rel="shortcut icon" href="/static/tilon-logo.svg?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        img {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            background-color: transparent !important;
        }
        :root {
            --bg: #f5f6f8; --bg2: #ffffff; --bg3: #f0f1f3; --bgh: #e8eaed;
            --accent: #2563eb; --accent2: #3b82f6;
            --tp: #1a1a2e; --ts: #64748b; --tm: #94a3b8; --border: #e2e8f0;
            --success: #10b981; --danger: #ef4444;
            --user-bg: rgba(37,99,235,0.07); --user-border: #2563eb; --sw: 280px;
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--tp); height: 100vh; overflow: hidden; }

        .logo-wrapper { display: flex; align-items: center; background-color: transparent; gap: 0; }
        .logo-wrapper img { display: block; mix-blend-mode: multiply; }
        .brand-mark { display: block; height: auto; flex-shrink: 0; }
        .brand-mark.login { width: 52px; }
        .brand-mark.sidebar { width: 34px; margin-right: 10px; }
        #app { display: none; height: 100vh; flex-direction: row; }

        .sidebar { width: var(--sw); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
        .sb-header { padding: 16px; border-bottom: 1px solid var(--border); }
        .ws-name { font-size: 16px; font-weight: 700; color: var(--tp); display: flex; align-items: center; }
        .us-status { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .sdot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; }
        .us-status span { font-size: 13px; color: var(--ts); }
        .sb-search { padding: 8px 10px; border-bottom: 1px solid var(--border); }
        .sb-search-box { display: flex; align-items: center; gap: 6px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; }
        .sb-search-box input { flex: 1; background: none; border: none; outline: none; font-size: 12px; color: var(--tp); font-family: inherit; }
        .sb-sec { padding: 12px 8px 4px; }
        .sb-sec-title { font-size: 11px; font-weight: 700; color: var(--tm); text-transform: uppercase; letter-spacing: .8px; padding: 0 8px; margin-bottom: 4px; }
        .sb-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: background .15s; font-size: 13px; color: var(--ts); }
        .sb-item:hover { background: var(--bgh); color: var(--tp); }
        .sb-item.active { background: var(--accent); color: #fff; }
        .sb-item .ic { font-size: 14px; flex-shrink: 0; }
        .sb-item .chat-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sb-item .del-btn { opacity: 0; font-size: 11px; padding: 2px 5px; border-radius: 3px; color: var(--tm); background: none; border: none; cursor: pointer; }
        .sb-item:hover .del-btn { opacity: 1; }
        .sb-item .del-btn:hover { color: var(--danger); }
        .new-btn { margin: 8px; padding: 8px 12px; background: transparent; border: 1px dashed var(--border); border-radius: 6px; color: var(--tm); font-size: 13px; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .2s; }
        .new-btn:hover { border-color: var(--accent); color: var(--accent); }
        .chat-list { max-height: 220px; overflow-y: auto; margin: 0 8px; }
        .chat-list::-webkit-scrollbar { width: 3px; }
        .chat-list::-webkit-scrollbar-thumb { background: var(--border); }

        .shelf-wrap { padding: 0 8px 8px; }
        .shelf-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
        .shelf-upload-btn { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg3); color: var(--ts); font-size: 12px; font-family: inherit; cursor: pointer; transition: all .2s; }
        .shelf-upload-btn:hover { border-color: var(--accent); color: var(--accent); }
        .shelf-upload-btn:disabled { opacity: .6; cursor: not-allowed; }
        .shelf-stop-btn { display: none; padding: 8px 10px; border: 1px solid #fecaca; border-radius: 6px; background: #fff1f2; color: #dc2626; font-size: 12px; font-family: inherit; cursor: pointer; white-space: nowrap; }
        .shelf-stop-btn.show { display: inline-flex; align-items: center; justify-content: center; }
        .shelf-stop-btn:hover { background: #ffe4e6; border-color: #fca5a5; }
        .shelf-list { max-height: 210px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: #fafbfd; padding: 6px; }
        .shelf-list::-webkit-scrollbar { width: 4px; }
        .shelf-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .shelf-empty { font-size: 12px; color: var(--tm); text-align: center; padding: 16px 8px; }
        .shelf-item { border: 1px solid var(--border); background: #fff; border-radius: 6px; padding: 8px; margin-bottom: 6px; }
        .shelf-item:last-child { margin-bottom: 0; }
        .shelf-item-top { display: flex; align-items: center; gap: 6px; }
        .shelf-item-name { flex: 1; min-width: 0; background: none; border: none; text-align: left; font-size: 12px; color: var(--tp); cursor: pointer; font-family: inherit; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .shelf-item-name.active { color: var(--accent); }
        .shelf-del-btn { flex-shrink: 0; font-size: 11px; padding: 3px 6px; border: 1px solid var(--border); border-radius: 4px; background: #fff; color: var(--tm); cursor: pointer; font-family: inherit; }
        .shelf-del-btn:hover { border-color: var(--danger); color: var(--danger); background: #fff5f5; }
        .shelf-item-meta { margin-top: 4px; font-size: 11px; color: var(--tm); }
        .shelf-count { margin-left: 6px; padding: 1px 6px; border-radius: 999px; font-size: 10px; font-weight: 700; color: var(--accent); background: rgba(37,99,235,0.10); border: 1px solid rgba(37,99,235,0.25); }

        .sb-footer { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); }
        .user-row { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; }
        .avatar { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .ur-text { flex: 1; min-width: 0; }
        .ur-name { font-size: 14px; font-weight: 600; color: var(--tp); }
        .ur-role { font-size: 11px; color: var(--tm); }
        .logout-btn { background: none; border: 1px solid var(--border); color: var(--ts); cursor: pointer; font-size: 11px; font-weight: 600; font-family: inherit; padding: 4px 8px; border-radius: 5px; white-space: nowrap; }
        .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg); flex-shrink: 0; }
        .chat-header h3 { font-size: 15px; font-weight: 700; color: var(--tp); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .hdr-btn { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--ts); font-size: 12px; font-family: inherit; cursor: pointer; transition: all .2s; white-space: nowrap; }
        .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 2px; scroll-behavior: smooth; }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .msg-group { display: flex; flex-direction: column; margin-bottom: 14px; animation: msgIn .2s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
        .msg-sender { font-size: 14px; font-weight: 700; }
        .msg-sender.ai { color: var(--accent); }
        .typing-label { display: inline-flex; align-items: center; gap: 4px; color: var(--accent); font-size: 13px; }
        .msg-time { font-size: 11px; color: var(--tm); }
        .copy-btn { opacity: 0; font-size: 11px; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg3); color: var(--ts); cursor: pointer; font-family: inherit; }
        .msg-group:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
        .msg-text { font-size: 14px; line-height: 1.65; color: var(--tp); white-space: pre-wrap; word-break: break-word; }
        .msg-text.user { background: var(--user-bg); border-left: 3px solid var(--user-border); padding: 8px 12px; border-radius: 0 6px 6px 0; }

        .typing { display: flex; align-items: center; gap: 8px; color: var(--tm); font-size: 13px; padding: 4px 0; }
        .dots { display: flex; gap: 4px; }
        .dots span { width: 6px; height: 6px; background: var(--tm); border-radius: 50%; animation: bounce .8s infinite; }
        .dots span:nth-child(2) { animation-delay: .15s; }
        .dots span:nth-child(3) { animation-delay: .3s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

        .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; gap: 10px; }
        .welcome h2 { font-size: 22px; font-weight: 700; color: var(--tp); }
        .welcome p { font-size: 14px; color: var(--ts); max-width: 360px; line-height: 1.6; }
        .input-area { padding: 10px 20px 14px; background: var(--bg); flex-shrink: 0; }
        .input-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: flex-end; gap: 6px; padding: 8px 8px 8px 14px; transition: border-color .2s; }
        .input-box:focus-within { border-color: var(--accent); }
        #msg-input { flex: 1; background: none; border: none; outline: none; color: var(--tp); font-size: 14px; font-family: inherit; resize: none; max-height: 120px; min-height: 22px; line-height: 1.5; padding: 2px 0; }
        #msg-input::placeholder { color: var(--tm); }
        .send-btn { width: 32px; height: 32px; background: var(--accent); border: none; border-radius: 6px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .send-btn:hover { background: var(--accent2); }
        .send-btn:disabled { background: var(--border); cursor: not-allowed; }
        .stop-btn { width: 32px; height: 32px; background: #fee2e2; border: 1px solid var(--danger); border-radius: 6px; color: var(--danger); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .input-hint { font-size: 11px; color: var(--tm); margin-top: 5px; text-align: center; }

        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--tp); z-index: 300; opacity: 0; transform: translateY(8px); transition: all .3s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateY(0); }

        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-bg.open { display: flex; }
        .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 500px; max-width: 90vw; }
        .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; color: var(--tp); }
        .modal p { font-size: 13px; color: var(--ts); margin-bottom: 16px; }
        .modal textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: var(--tp); font-size: 13px; font-family: inherit; resize: vertical; min-height: 120px; outline: none; line-height: 1.5; }
        .modal textarea:focus { border-color: var(--accent); }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
        .mbtn { padding: 8px 18px; border-radius: 6px; font-size: 14px; font-family: inherit; cursor: pointer; border: none; }
        .mbtn.cancel { background: var(--bg3); color: var(--ts); border: 1px solid var(--border); }
        .mbtn.save { background: var(--accent); color: #fff; }

        @media(max-width:900px) {
            .sidebar { display: none; }
            .chat-header { padding: 12px; }
            .input-area { padding: 10px 12px 12px; }
            .messages { padding: 14px; }
        }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="modal-bg" id="sp-modal">
    <div class="modal">
        <h3>⚙️ システムプロンプト設定</h3>
        <p>AIの役割と応答方法を指定してください。</p>
        <textarea id="sp-input" placeholder="例: あなたはTilon AIアシスタントです。"></textarea>
        <div class="modal-btns">
            <button class="mbtn cancel" onclick="closeModal('sp-modal')">キャンセル</button>
            <button class="mbtn save" onclick="savePrompt()">保存</button>
        </div>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="sb-header">
            <div class="ws-name logo-wrapper">
<img class="brand-mark sidebar" src="/static/tilon-logo.svg?v=2" alt="Tilon AI ロゴ">
                Tilon AI
            </div>
            <div class="us-status"><div class="sdot"></div><span id="sb-user">ユーザー</span></div>
        </div>

        <div class="sb-search">
            <div class="sb-search-box">
                <span>🔎</span>
                <input type="text" placeholder="チャットを検索..." oninput="filterChats(this.value)">
            </div>
        </div>

        <div class="sb-sec"><div class="sb-sec-title">チャット一覧</div></div>
        <button class="new-btn" onclick="newChat()">＋ 新しいチャット</button>
        <div class="chat-list" id="chat-list"></div>

        <div class="sb-sec"><div class="sb-sec-title">アップロード済みファイル <span class="shelf-count" id="shelf-count">0個</span></div></div>
        <div class="shelf-wrap">
            <div class="shelf-head">
                <button class="shelf-upload-btn" id="shelf-upload-btn" onclick="openShelfUpload()">📎 ファイルをアップロード</button>
                <button class="shelf-stop-btn" id="shelf-stop-btn" type="button" onclick="stopShelfUpload()">⏹ 停止</button>
            </div>
            <div class="shelf-list" id="shelf-list">
                <div class="shelf-empty">アップロードされたファイルがありません</div>
            </div>
            <input type="file" id="shelf-file" accept=".pdf,.png,.jpg,.jpeg,.webp" multiple style="display:none" onchange="uploadToShelf(this)">
        </div>

        <div class="sb-footer">
            <div class="user-row">
                <div class="avatar" id="u-avatar">A</div>
                <div class="ur-text">
                    <div class="ur-name" id="u-name">ユーザー</div>
                    <div class="ur-role" id="u-role">一般従業員</div>
                </div>
                <button class="logout-btn" onclick="doLogout()">ログアウト</button>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <span style="font-size:16px">💬</span>
            <h3 id="hdr-title">新しいチャット</h3>
            <button class="hdr-btn" onclick="openModal('sp-modal')">⚙️ プロンプト</button>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <div class="input-box">
                <textarea id="msg-input" rows="1" placeholder="メッセージを入力... (Shift+Enterで改行)"></textarea>
                <button class="stop-btn" id="stop-btn" onclick="stopGeneration()" style="display:none">⏹</button>
                <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
            </div>
            <div class="input-hint">AIエラーの可能性があります。重要な情報は必ず確認してください。</div>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin;

    function safeParseJSON(raw, fallback) {
        if (!raw) return fallback;
        try {
            return JSON.parse(raw);
        } catch (error) {
            console.warn('Failed to parse stored JSON:', error);
            return fallback;
        }
    }

    const USERS = safeParseJSON(localStorage.getItem('ai_users'), null) || {
        'admin': { pw: 'admin123', role: '管理者' },
        'tilon': { pw: 'tilon123', role: '一般従業員' },
        'employee1': { pw: '1234', role: '一般従業員' }
    };

    const SESSION_USER_KEY = 'ai_current_user';
    const LOGIN_PATH = '/login';
    const SAFE_USER_ID_RE = /^[A-Za-z0-9._-]+$/;
    const CHAT_KEY_PREFIX = 'ai_chats';
    const DOC_KEY_PREFIX = 'ai_uploaded_docs';
    const SYS_PROMPT_KEY_PREFIX = 'ai_sys_prompt';
    const MAX_SHELF_FILES = 90;
    const HISTORY_MAX_MESSAGES = 12;

    const DEFAULT_SYSTEM_PROMPT = 'あなたはTilon AIです。日本語で親切かつ明確に回答してください。中国語(漢字)は絶対に使用しないでください。';

    let currentUser = null;
    let isLoading = false;
    let abortController = null;
    let systemPrompt = DEFAULT_SYSTEM_PROMPT;
    let chats = [];
    let uploadedDocs = [];
    let currentChatId = null;
    let shelfUploadAbortController = null;
    let shelfUploadInProgress = false;
    let shelfUploadCancelRequested = false;

    function now() {
        return new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    }

    function esc(t) {
        return String(t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function normalizeUserRole(id, role) {
        if (id === 'admin') return '管理者';
        return role || '一般従業員';
    }

    function toast(msg, dur = 2500) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), dur);
    }

    function normalizeChats(raw) {
        const list = Array.isArray(raw) ? raw : [];
        return list.map(chat => ({
            id: chat.id || ('c_' + Date.now()),
            title: chat.title || '新しいチャット',
            active_source: chat.active_source || null,
            active_doc_id: chat.active_doc_id || null,
            messages: Array.isArray(chat.messages) ? chat.messages.map(m => ({
                sender: m.sender || 'Tilon AI',
                text: m.text || '',
                isUser: !!m.isUser,
                hasScope: false
            })) : []
        }));
    }

    function normalizeDocs(raw) {
        const list = Array.isArray(raw) ? raw : [];
        const map = new Map();
        list.forEach(d => {
            const doc = {
                source: d.source || d.filename || '',
                doc_id: d.doc_id || '',
                chunks: Number(d.chunks || d.chunks_stored || 0),
                uploaded_at: d.uploaded_at || Date.now()
            };
            if (!doc.source) return;
            map.set(docKey(doc), doc);
        });
        return Array.from(map.values()).sort((a, b) => String(a.source).localeCompare(String(b.source), 'ja'));
    }

    function docKey(doc) {
        if (doc.doc_id) return 'id:' + doc.doc_id;
        return 'src:' + String(doc.source || '').toLowerCase();
    }

    function userScopedKey(prefix) {
        return currentUser ? `${prefix}:${currentUser.id}` : prefix;
    }

    function loadUserState() {
        chats = normalizeChats(safeParseJSON(localStorage.getItem(userScopedKey(CHAT_KEY_PREFIX)), []));
        uploadedDocs = normalizeDocs(safeParseJSON(localStorage.getItem(userScopedKey(DOC_KEY_PREFIX)), []));
        systemPrompt = localStorage.getItem(userScopedKey(SYS_PROMPT_KEY_PREFIX)) || DEFAULT_SYSTEM_PROMPT;
        currentChatId = chats.length ? chats[0].id : null;
    }

    function resolveRouteUserId() {
        const path = window.location.pathname || '';
        if (path === '/' || path === LOGIN_PATH || path === '/ui') return null;

        const rawUserId = decodeURIComponent(path.replace(/^\/+/, '').split('/')[0] || '').trim();
        if (!rawUserId || !SAFE_USER_ID_RE.test(rawUserId)) return null;
        return rawUserId;
    }

    function redirectToLogin() {
        window.location.replace(LOGIN_PATH);
    }

    async function bootstrapApp() {
        try {
            const routeUserId = resolveRouteUserId();
            const sessionUserId = sessionStorage.getItem(SESSION_USER_KEY);
            const routeUser = routeUserId ? USERS[routeUserId] : null;

            if (!routeUserId || !routeUser || sessionUserId !== routeUserId) {
                redirectToLogin();
                return false;
            }

            const normalizedRole = normalizeUserRole(routeUserId, routeUser.role);
            currentUser = { id: routeUserId, role: normalizedRole };
            loadUserState();
            document.getElementById('app').style.display = 'flex';
            document.getElementById('sb-user').textContent = routeUserId;
            document.getElementById('u-name').textContent = routeUserId;
            document.getElementById('u-role').textContent = normalizedRole;
            document.getElementById('u-avatar').textContent = routeUserId[0].toUpperCase();

            if (chats.length === 0) newChat();
            else {
                renderChatList();
                loadChat(chats[0].id);
            }
            renderShelfDocs();

            await Promise.all([loadHealth(), syncDocsFromServer()]);
            return true;
        } catch (error) {
            console.error('Failed to bootstrap app:', error);
            currentUser = currentUser || { id: resolveRouteUserId() || 'unknown', role: '' };
            chats = [];
            uploadedDocs = [];
            currentChatId = null;
            document.getElementById('app').style.display = 'flex';
            document.getElementById('sb-user').textContent = currentUser.id;
            document.getElementById('u-name').textContent = currentUser.id;
            document.getElementById('u-role').textContent = normalizeUserRole(currentUser.id, currentUser.role);
            document.getElementById('u-avatar').textContent = currentUser.id[0]?.toUpperCase() || 'U';
            newChat();
            renderShelfDocs();
            return false;
        }
    }

    function saveChats() {
        if (!currentUser) return;
        localStorage.setItem(userScopedKey(CHAT_KEY_PREFIX), JSON.stringify(chats));
    }

    function saveDocs() {
        if (!currentUser) return;
        localStorage.setItem(userScopedKey(DOC_KEY_PREFIX), JSON.stringify(uploadedDocs));
    }

    function currentChat() {
        return chats.find(c => c.id === currentChatId) || null;
    }

    function ensureCurrentChat() {
        const chat = currentChat();
        if (!chat) {
            newChat();
            return currentChat();
        }
        return chat;
    }

    function buildHistoryForAPI(messages) {
        const list = Array.isArray(messages) ? messages : [];
        return list
            .slice(-HISTORY_MAX_MESSAGES)
            .map(m => ({
                role: m.isUser ? 'user' : 'assistant',
                content: String(m.text || '').trim()
            }))
            .filter(m => m.content.length > 0);
    }

    function doLogout() {
        if (shelfUploadInProgress) stopShelfUpload();
        sessionStorage.removeItem(SESSION_USER_KEY);
        currentUser = null;
        chats = [];
        uploadedDocs = [];
        currentChatId = null;
        systemPrompt = DEFAULT_SYSTEM_PROMPT;
        document.getElementById('app').style.display = 'none';
        redirectToLogin();
    }

    async function loadHealth() {
        try {
            await fetch(API + '/health');
        } catch {}
    }

    function openModal(id) {
        if (id === 'sp-modal') document.getElementById('sp-input').value = systemPrompt;
        document.getElementById(id).classList.add('open');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('open');
    }

    document.querySelectorAll('.modal-bg').forEach(bg => {
        bg.addEventListener('click', e => {
            if (e.target === bg) bg.classList.remove('open');
        });
    });

    function savePrompt() {
        systemPrompt = document.getElementById('sp-input').value.trim() || DEFAULT_SYSTEM_PROMPT;
        if (currentUser) localStorage.setItem(userScopedKey(SYS_PROMPT_KEY_PREFIX), systemPrompt);
        closeModal('sp-modal');
        toast('✅ システムプロンプトが保存されました');
    }

    function newChat() {
        const id = 'c_' + Date.now();
        chats.unshift({ id, title: '新しいチャット', active_source: null, active_doc_id: null, messages: [] });
        saveChats();
        renderChatList();
        loadChat(id);
    }

    function loadChat(id) {
        currentChatId = id;
        const chat = currentChat();
        if (!chat) return;

        document.getElementById('hdr-title').textContent = chat.title;
        document.querySelectorAll('.sb-item[data-id]').forEach(el => {
            el.classList.toggle('active', el.dataset.id === id);
        });

        const msgs = document.getElementById('messages');
        msgs.innerHTML = '';

        if (chat.messages.length === 0) {
            msgs.innerHTML = `<div class="welcome" id="welcome">
                <h2>メッセージを入力してチャットを始めてください</h2>
                <p>アップロードされたファイルの内容に基づいた回答や、一般的な質問に答えることができます。</p>
            </div>`;
        } else {
            chat.messages.forEach(m => renderMsg(m.sender, m.text, m.isUser, !!m.hasScope, false));
            msgs.scrollTop = msgs.scrollHeight;
        }

        renderScopeBanner();
        renderShelfDocs();
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        chats = chats.filter(c => c.id !== id);
        saveChats();
        renderChatList();
        if (currentChatId === id) {
            if (chats.length > 0) loadChat(chats[0].id);
            else newChat();
        }
    }

    function renderChatList() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        chats.forEach(chat => {
            const el = document.createElement('div');
            el.className = 'sb-item' + (chat.id === currentChatId ? ' active' : '');
            el.dataset.id = chat.id;
            el.innerHTML = `<span class="ic">💬</span><span class="chat-name">${esc(chat.title)}</span>
                <button class="del-btn" onclick="deleteChat('${chat.id}',event)">✕</button>`;
            el.onclick = evt => {
                if (!evt.target.classList.contains('del-btn')) loadChat(chat.id);
            };
            list.appendChild(el);
        });
    }

    function filterChats(kw) {
        const q = String(kw || '').toLowerCase();
        document.querySelectorAll('.sb-item[data-id]').forEach(el => {
            const name = el.querySelector('.chat-name').textContent.toLowerCase();
            el.style.display = (!q || name.includes(q)) ? '' : 'none';
        });
    }

    function openShelfUpload() {
        if (shelfUploadInProgress) {
            toast('アップロード進行中です。停止してからやり直してください。');
            return;
        }
        document.getElementById('shelf-file').click();
    }

    function setShelfUploadProgress(done, total, currentFile) {
        const btn = document.getElementById('shelf-upload-btn');
        const stopBtn = document.getElementById('shelf-stop-btn');
        btn.disabled = true;
        btn.textContent = `⏳ アップロード中... (${done}/${total})`;
        btn.title = currentFile || '';
        stopBtn.classList.add('show');
    }

    function resetShelfUploadProgress() {
        const btn = document.getElementById('shelf-upload-btn');
        const stopBtn = document.getElementById('shelf-stop-btn');
        btn.disabled = false;
        btn.textContent = '📎 ファイルをアップロード';
        btn.title = '';
        stopBtn.classList.remove('show');
    }

    function stopShelfUpload() {
        if (!shelfUploadInProgress) return;
        shelfUploadCancelRequested = true;
        if (shelfUploadAbortController) shelfUploadAbortController.abort();
        toast('⏹ アップロード中断要求');
    }

    function upsertDoc(doc) {
        if (!doc || !doc.source) return;
        const key = docKey(doc);
        const map = new Map(uploadedDocs.map(d => [docKey(d), d]));
        const prev = map.get(key) || {};
        map.set(key, {
            source: doc.source,
            doc_id: doc.doc_id || prev.doc_id || '',
            chunks: Number(doc.chunks || prev.chunks || 0),
            uploaded_at: doc.uploaded_at || prev.uploaded_at || Date.now()
        });
        uploadedDocs = Array.from(map.values()).sort((a, b) => String(a.source).localeCompare(String(b.source), 'ja'));
        saveDocs();
    }

    function updateShelfCount() {
        const el = document.getElementById('shelf-count');
        if (!el) return;
        el.textContent = `${uploadedDocs.length}個`;
    }

    function renderShelfDocs() {
        updateShelfCount();
        const list = document.getElementById('shelf-list');

        if (!uploadedDocs.length) {
            list.innerHTML = '<div class="shelf-empty">アップロードされたファイルがありません</div>';
            return;
        }

        list.innerHTML = '';
        uploadedDocs.forEach(doc => {
            const row = document.createElement('div');
            row.className = 'shelf-item';

            const top = document.createElement('div');
            top.className = 'shelf-item-top';

            const nameBtn = document.createElement('button');
            nameBtn.type = 'button';
            nameBtn.className = 'shelf-item-name';
            nameBtn.textContent = doc.source;
            nameBtn.title = doc.source;
            nameBtn.onclick = () => toast('アップロードされたすべてのファイルを基準に回答します。');

            const delBtn = document.createElement('button');
            delBtn.type = 'button';
            delBtn.className = 'shelf-del-btn';
            delBtn.textContent = '削除';
            delBtn.onclick = (evt) => {
                evt.stopPropagation();
                deleteShelfDoc(doc);
            };

            const meta = document.createElement('div');
            meta.className = 'shelf-item-meta';
            meta.textContent = doc.chunks ? (doc.chunks + ' chunks') : 'chunk情報なし';

            top.appendChild(nameBtn);
            top.appendChild(delBtn);
            row.appendChild(top);
            row.appendChild(meta);
            list.appendChild(row);
        });
    }

    function selectShelfDoc(source, docId) {
        return;
    }

    async function deleteShelfDoc(doc) {
        if (!doc || !doc.source) return;
        if (!confirm(`"${doc.source}" を削除しますか？`)) return;

        try {
            const query = new URLSearchParams();
            if (doc.doc_id) {
                query.set('doc_id', doc.doc_id);
            }
            query.set('source', doc.source);

            if (currentUser?.id) query.set('user_id', currentUser.id);
            const res = await fetch(API + '/upload-document?' + query.toString(), { method: 'DELETE' });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                if (res.status === 404) {
                    uploadedDocs = uploadedDocs.filter(d => docKey(d) !== docKey(doc));
                    saveDocs();
                    renderShelfDocs();
                    toast('サーバーには存在しなかったため、一覧からのみ削除しました。');
                    await syncDocsFromServer();
                    return;
                }
                throw new Error(data.detail || '削除に失敗しました');
            }

            uploadedDocs = uploadedDocs.filter(d => docKey(d) !== docKey(doc));

            saveDocs();
            saveChats();
            renderShelfDocs();
            renderChatList();
            renderScopeBanner();
            await syncDocsFromServer();
            toast(data.message || '削除が完了しました');
        } catch (err) {
            toast('❌ ファイル削除失敗: ' + err.message);
        }
    }

    async function syncDocsFromServer() {
        try {
            const query = new URLSearchParams();
            if (currentUser?.id) query.set('user_id', currentUser.id);
            const res = await fetch(API + '/docs-list' + (query.toString() ? ('?' + query.toString()) : ''));
            if (!res.ok) return;
            const data = await res.json();
            const grouped = new Map();

            (data.documents || []).forEach(d => {
                if ((d.source_type || '') !== 'upload') return;
                const key = d.doc_id ? 'id:' + d.doc_id : 'src:' + String(d.source || '').toLowerCase();
                if (!grouped.has(key)) {
                    grouped.set(key, {
                        source: d.source || '',
                        doc_id: d.doc_id || '',
                        chunks: 0,
                        uploaded_at: Date.now()
                    });
                }
                const found = grouped.get(key);
                found.chunks += 1;
            });

            Array.from(grouped.values()).forEach(upsertDoc);
            renderShelfDocs();
        } catch {}
    }

    async function uploadToShelf(input) {
        let files = Array.from((input && input.files) || []);
        input.value = '';
        if (!files.length) return;
        if (shelfUploadInProgress) {
            toast('すでにアップロード中です。');
            return;
        }

        if (files.length > MAX_SHELF_FILES) {
            files = files.slice(0, MAX_SHELF_FILES);
            toast(`一度に最大 ${MAX_SHELF_FILES} 個までアップロードできます。先頭の ${MAX_SHELF_FILES} 個のみ処理します。`);
        }

        shelfUploadInProgress = true;
        shelfUploadCancelRequested = false;
        shelfUploadAbortController = null;
        setShelfUploadProgress(0, files.length, '');

        let ok = 0;
        let failed = 0;
        let completed = 0;
        let canceled = false;
        const failedReasons = [];

        try {
            for (let i = 0; i < files.length; i++) {
                if (shelfUploadCancelRequested) {
                    canceled = true;
                    break;
                }
                const file = files[i];
                setShelfUploadProgress(completed, files.length, file.name);

                try {
                    const fd = new FormData();
                    fd.append('file', file);
                    if (currentUser?.id) fd.append('user_id', currentUser.id);
                    shelfUploadAbortController = new AbortController();

                    const res = await fetch(API + '/upload', {
                        method: 'POST',
                        body: fd,
                        signal: shelfUploadAbortController.signal
                    });
                    const data = await res.json().catch(() => ({}));

                    if (!res.ok) {
                        failed += 1;
                        const reason = data.detail || `${res.status} ${res.statusText}`;
                        failedReasons.push(`${file.name}: ${reason}`);
                        completed += 1;
                        setShelfUploadProgress(completed, files.length, file.name);
                        continue;
                    }

                    const chunks = Number(data.chunks_stored || 0);
                    if (chunks <= 0) {
                        failed += 1;
                        failedReasons.push(`${file.name}: テキスト抽出失敗`);
                        completed += 1;
                        setShelfUploadProgress(completed, files.length, file.name);
                        continue;
                    }

                    const doc = {
                        source: data.filename || file.name,
                        doc_id: data.doc_id || '',
                        chunks,
                        uploaded_at: Date.now()
                    };
                    upsertDoc(doc);

                    const activeChat = ensureCurrentChat();
                    if (activeChat) {
                        activeChat.active_source = doc.source || null;
                        activeChat.active_doc_id = doc.doc_id || null;
                        saveChats();
                    }

                    ok += 1;
                    completed += 1;
                    setShelfUploadProgress(completed, files.length, file.name);
                } catch (err) {
                    if (err && err.name === 'AbortError' && shelfUploadCancelRequested) {
                        canceled = true;
                        break;
                    }
                    failed += 1;
                    failedReasons.push(`${file.name}: ${err.message}`);
                    completed += 1;
                    setShelfUploadProgress(completed, files.length, file.name);
                } finally {
                    shelfUploadAbortController = null;
                }
            }

            if (ok > 0) {
                await syncDocsFromServer();
            }

            renderShelfDocs();

            if (canceled) {
                const canceledCount = Math.max(0, files.length - completed);
                toast(`⏹ アップロード中断: 保存 ${ok}件, キャンセル ${canceledCount}件`);
            } else if (ok > 0) {
                toast(`✅ アップロード完了: ${ok}個のファイル`);
            }

            if (failed > 0) {
                const preview = failedReasons.slice(0, 2).join(' | ');
                const suffix = failedReasons.length > 2 ? ` ほか ${failedReasons.length - 2}件` : '';
                toast(`⚠️ アップロード失敗: ${failed}個のファイル` + (preview ? ` (${preview}${suffix})` : ''));
                console.warn('Upload failed details:', failedReasons);
            }
        } finally {
            shelfUploadAbortController = null;
            shelfUploadInProgress = false;
            shelfUploadCancelRequested = false;
            resetShelfUploadProgress();
        }
    }

    function stopGeneration() {
        if (abortController) {
            abortController.abort();
            abortController = null;
        }
        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('stop-btn').style.display = 'none';
        toast('⏹ 応答を停止しました');
    }

    function isDocumentIntent(text) {
        const q = String(text || '').toLowerCase();
        const keywords = [
            '文書', 'ファイル', '添付', 'アップロード', 'pdf', 'ページ', '本文', '原文',
            '歌詞', '要約', '整理', '出典', '根拠', 'テキスト抽出', 'テキストだけ', '全文', '文字抽出',
            'document', 'file', 'upload', 'pdf', 'page', 'source', 'quote', 'lyrics',
            'summarize', 'summary', 'extract', 'transcribe'
        ];
        return keywords.some(k => q.includes(k));
    }

    function isDocumentFollowup(text) {
        const q = String(text || '').toLowerCase().trim();
        const hints = ['その部分', '上の内容', 'さっき', 'それ', 'そこ', 'もう一度', '続けて', '続き'];
        return q.length <= 20 && hints.some(k => q.includes(k));
    }

    function isGeneralChatOverride(text) {
        const q = String(text || '').toLowerCase();
        const keywords = [
            '文書じゃなくて', 'ファイルじゃなくて', 'アップロードとは関係なく', '普通に会話', '新しい話題', '話題を変えて',
            'それじゃなくて', '文書と関係なく',
            'not about file', 'ignore file', 'new topic', 'general chat'
        ];
        return keywords.some(k => q.includes(k));
    }

    function shouldUseUploadScope(chat, text) {
        if (!uploadedDocs.length) return false;
        if (isGeneralChatOverride(text)) return false;
        return true;
    }

    async function sendMsg() {
        if (isLoading) return;
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text) return;

        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        const chat = ensureCurrentChat();
        if (!chat) return;

        if (chat.title === '新しいチャット') {
            chat.title = text.length > 28 ? text.slice(0, 28) + '…' : text;
            document.getElementById('hdr-title').textContent = chat.title;
            renderChatList();
        }

        input.value = '';
        input.style.height = 'auto';

        const uMsg = { sender: currentUser.id, text, isUser: true, hasScope: false };
        chat.messages.push(uMsg);
        saveChats();
        renderMsg(uMsg.sender, uMsg.text, true, uMsg.hasScope, true);

        const tid = showTyping();
        isLoading = true;
        document.getElementById('send-btn').disabled = true;
        document.getElementById('stop-btn').style.display = 'flex';
        abortController = new AbortController();

        try {
            const useUploadScope = shouldUseUploadScope(chat, text);
            const payload = {
                message: text,
                system_prompt: systemPrompt,
                history: buildHistoryForAPI(chat.messages.slice(0, -1)),
                active_source: useUploadScope ? (chat.active_source || null) : null,
                active_doc_id: useUploadScope ? (chat.active_doc_id || null) : null,
                active_source_type: useUploadScope ? 'upload' : null,
                web_search_enabled: false,
                user_id: currentUser ? currentUser.id : null
            };

            const res = await fetch(API + '/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                signal: abortController.signal,
                body: JSON.stringify(payload)
            });

            removeTyping(tid);

            if (!res.ok) {
                let detail = '';
                try {
                    const errPayload = await res.json();
                    detail = String(errPayload.detail || errPayload.message || '').trim();
                } catch {}
                const suffix = detail ? (' | ' + detail) : '';
                renderMsg('Tilon AI', '⚠️ サーバーエラーが発生しました。' + suffix, false, false, true);
            } else {
                const d = await res.json();
                const answer = d.answer || d.reply || '応答が空です。';

                if (useUploadScope) {
                    chat.active_source = d.active_source || chat.active_source || null;
                    chat.active_doc_id = d.active_doc_id || chat.active_doc_id || null;
                } else {
                    chat.active_source = null;
                    chat.active_doc_id = null;
                }

                const hasScope = !!(chat.active_source || chat.active_doc_id);
                const aMsg = { sender: 'Tilon AI', text: answer, isUser: false, hasScope };
                chat.messages.push(aMsg);
                saveChats();
                renderMsg(aMsg.sender, aMsg.text, false, hasScope, true);
            }
        } catch (err) {
            removeTyping(tid);
            if (err.name === 'AbortError') {
                renderMsg('Tilon AI', '⏹ 応答が中断されました。', false, false, true);
            } else {
                renderMsg('Tilon AI', '⚠️ サーバーに接続できません。\n' + API + ' を確認してください。', false, false, true);
            }
        }

        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('stop-btn').style.display = 'none';
        abortController = null;
        input.focus();
    }

    function renderMsg(sender, text, isUser, hasScope, scroll) {
        const msgs = document.getElementById('messages');
        const g = document.createElement('div');
        g.className = 'msg-group';
        g.innerHTML = `
            <div class="msg-meta">
                <span class="msg-sender ${isUser ? '' : 'ai'}">${isUser ? esc(sender) : esc(sender)}</span>
                <span class="msg-time">${now()}</span>
                <button class="copy-btn" onclick="copyMsg(this)">コピー</button>
            </div>
            <div class="msg-text ${isUser ? 'user' : ''}">${esc(text)}</div>`;
        msgs.appendChild(g);
        if (scroll) msgs.scrollTop = msgs.scrollHeight;
    }

    function copyMsg(btn) {
        const text = btn.closest('.msg-group').querySelector('.msg-text').innerText;
        navigator.clipboard.writeText(text).then(() => {
            btn.textContent = '✅';
            setTimeout(() => btn.textContent = 'コピー', 1500);
        });
    }

    function showTyping() {
        const msgs = document.getElementById('messages');
        const id = 'tp' + Date.now();
        const el = document.createElement('div');
        el.id = id;
        el.className = 'typing';
        el.innerHTML = `<span class="typing-label">Tilon AI</span>
            <div class="dots"><span></span><span></span><span></span></div>`;
        msgs.appendChild(el);
        msgs.scrollTop = msgs.scrollHeight;
        return id;
    }

    function removeTyping(id) {
        const node = document.getElementById(id);
        if (node) node.remove();
    }

    const ta = document.getElementById('msg-input');
    ta.addEventListener('input', () => {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    });
    ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    });

    bootstrapApp();
